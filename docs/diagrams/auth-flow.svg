<svg xmlns="http://www.w3.org/2000/svg" width="960" height="800" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arr-green-left" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="800" fill="#f1f5f9"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="960" height="46" fill="#0f172a"/>
  <text x="480" y="29" text-anchor="middle" font-size="17" font-weight="bold" fill="white" letter-spacing="1.5">FLUJO DE AUTENTICACIÓN</text>

  <!-- ===== ACTOR BOXES ===== -->

  <!-- Usuario (cx=90) -->
  <rect x="20" y="54" width="140" height="44" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Usuario</text>

  <!-- Frontend (cx=260) -->
  <rect x="190" y="54" width="140" height="44" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Frontend</text>

  <!-- Backend (cx=465) -->
  <rect x="395" y="54" width="140" height="44" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="465" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Backend</text>

  <!-- PostgreSQL (cx=670) -->
  <rect x="600" y="54" width="140" height="44" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">PostgreSQL</text>

  <!-- Nodemailer (cx=875) -->
  <rect x="805" y="54" width="140" height="44" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="875" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Nodemailer</text>

  <!-- ===== LIFELINES ===== -->
  <line x1="90"  y1="100" x2="90"  y2="755" stroke="#94a3b8" stroke-dasharray="6,5" stroke-width="1.5"/>
  <line x1="260" y1="100" x2="260" y2="755" stroke="#94a3b8" stroke-dasharray="6,5" stroke-width="1.5"/>
  <line x1="465" y1="100" x2="465" y2="755" stroke="#94a3b8" stroke-dasharray="6,5" stroke-width="1.5"/>
  <line x1="670" y1="100" x2="670" y2="755" stroke="#94a3b8" stroke-dasharray="6,5" stroke-width="1.5"/>
  <line x1="875" y1="100" x2="875" y2="755" stroke="#94a3b8" stroke-dasharray="6,5" stroke-width="1.5"/>

  <!-- ===== SECTION 1: REGISTRO ===== -->
  <rect x="10" y="110" width="940" height="222" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="10" y="110" width="110" height="24" rx="4" fill="#2563eb"/>
  <text x="65" y="126" text-anchor="middle" font-size="11" font-weight="700" fill="white">1. REGISTRO</text>

  <!-- m1: Usuario → Frontend y=152 -->
  <line x1="94" y1="152" x2="252" y2="152" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <circle cx="90"  cy="152" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="260" cy="152" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="95" y="139" width="160" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="175" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">Completa formulario + foto</text>

  <!-- m2: Frontend → Backend y=185 -->
  <line x1="264" y1="185" x2="457" y2="185" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <circle cx="260" cy="185" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="465" cy="185" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="288" y="172" width="148" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="362" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">POST /registerUser</text>

  <!-- m3: Backend → PostgreSQL y=218 -->
  <line x1="469" y1="218" x2="662" y2="218" stroke="#0284c7" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="465" cy="218" r="4" fill="white" stroke="#0284c7" stroke-width="2"/>
  <circle cx="670" cy="218" r="4" fill="white" stroke="#0284c7" stroke-width="2"/>
  <rect x="470" y="205" width="194" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="567" y="217" text-anchor="middle" font-size="11" font-weight="600" fill="#0284c7">INSERT usuario (unconfirmed)</text>

  <!-- m4: Backend → Nodemailer y=251 -->
  <line x1="469" y1="251" x2="867" y2="251" stroke="#d97706" stroke-width="2" marker-end="url(#arr-orange)"/>
  <circle cx="465" cy="251" r="4" fill="white" stroke="#d97706" stroke-width="2"/>
  <circle cx="875" cy="251" r="4" fill="white" stroke="#d97706" stroke-width="2"/>
  <rect x="543" y="238" width="254" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="670" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#d97706">Enviar email con token JWT (1h)</text>

  <!-- m5: Backend → Frontend RETURN dashed y=300 -->
  <line x1="461" y1="300" x2="268" y2="300" stroke="#059669" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr-green-left)"/>
  <circle cx="465" cy="300" r="4" fill="white" stroke="#059669" stroke-width="2"/>
  <circle cx="260" cy="300" r="4" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="322" y="287" width="80" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="362" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">200 OK</text>

  <!-- ===== SECTION 2: CONFIRMACIÓN ===== -->
  <rect x="10" y="347" width="940" height="130" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <rect x="10" y="347" width="178" height="24" rx="4" fill="#7c3aed"/>
  <text x="99" y="363" text-anchor="middle" font-size="11" font-weight="700" fill="white">2. CONFIRMACIÓN DE CUENTA</text>

  <!-- m6: Usuario → Frontend y=385 -->
  <line x1="94" y1="385" x2="252" y2="385" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <circle cx="90"  cy="385" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="260" cy="385" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="96" y="372" width="158" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="175" y="384" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">Click en link del email</text>

  <!-- m7: Frontend → Backend y=418 -->
  <line x1="264" y1="418" x2="457" y2="418" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <circle cx="260" cy="418" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="465" cy="418" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="264" y="405" width="196" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="362" y="417" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">GET /confirmRegister/:token</text>

  <!-- m8: Backend → PostgreSQL y=451 -->
  <line x1="469" y1="451" x2="662" y2="451" stroke="#0284c7" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="465" cy="451" r="4" fill="white" stroke="#0284c7" stroke-width="2"/>
  <circle cx="670" cy="451" r="4" fill="white" stroke="#0284c7" stroke-width="2"/>
  <rect x="470" y="438" width="194" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="567" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#0284c7">UPDATE is_confirmed = true</text>

  <!-- ===== SECTION 3: LOGIN Y SESIÓN ===== -->
  <rect x="10" y="492" width="940" height="265" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <rect x="10" y="492" width="152" height="24" rx="4" fill="#059669"/>
  <text x="86" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="white">3. LOGIN Y SESIÓN</text>

  <!-- m9: Usuario → Frontend y=530 -->
  <line x1="94" y1="530" x2="252" y2="530" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <circle cx="90"  cy="530" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="260" cy="530" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="96" y="517" width="158" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="175" y="529" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">Email + contraseña</text>

  <!-- m10: Frontend → Backend y=563 -->
  <line x1="264" y1="563" x2="457" y2="563" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <circle cx="260" cy="563" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="465" cy="563" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="297" y="550" width="130" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="362" y="562" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">POST /loginUser</text>

  <!-- m11: Backend → PostgreSQL y=596 -->
  <line x1="469" y1="596" x2="662" y2="596" stroke="#0284c7" stroke-width="2" marker-end="url(#arr-blue)"/>
  <circle cx="465" cy="596" r="4" fill="white" stroke="#0284c7" stroke-width="2"/>
  <circle cx="670" cy="596" r="4" fill="white" stroke="#0284c7" stroke-width="2"/>
  <rect x="470" y="583" width="194" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="567" y="595" text-anchor="middle" font-size="11" font-weight="600" fill="#0284c7">SELECT + bcrypt.compare</text>

  <!-- m12: Backend → Frontend RETURN dashed y=629 -->
  <line x1="461" y1="629" x2="268" y2="629" stroke="#059669" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr-green-left)"/>
  <circle cx="465" cy="629" r="4" fill="white" stroke="#059669" stroke-width="2"/>
  <circle cx="260" cy="629" r="4" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="264" y="616" width="196" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="362" y="628" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Set-Cookie JWT (httpOnly, 7d)</text>

  <!-- m13: Frontend → Backend y=662 -->
  <line x1="264" y1="662" x2="457" y2="662" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <circle cx="260" cy="662" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="465" cy="662" r="4" fill="white" stroke="#7c3aed" stroke-width="2"/>
  <rect x="264" y="649" width="196" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="362" y="661" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">GET /me (cookie automática)</text>

  <!-- m14: Backend → Frontend RETURN dashed y=695 -->
  <line x1="461" y1="695" x2="268" y2="695" stroke="#059669" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr-green-left)"/>
  <circle cx="465" cy="695" r="4" fill="white" stroke="#059669" stroke-width="2"/>
  <circle cx="260" cy="695" r="4" fill="white" stroke="#059669" stroke-width="2"/>
  <rect x="312" y="682" width="100" height="18" rx="4" fill="white" fill-opacity="0.95" filter="url(#shadow)"/>
  <text x="362" y="694" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">{ id, role }</text>

  <!-- ===== LEGEND ===== -->
  <rect x="10" y="764" width="940" height="28" rx="6" fill="#e2e8f0"/>

  <!-- Purple: Request / Acción -->
  <line x1="20" y1="778" x2="50" y2="778" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="58" y="782" font-size="10" fill="#475569" font-weight="600">Request / Acción</text>

  <!-- Green dashed: Respuesta -->
  <line x1="195" y1="778" x2="225" y2="778" stroke="#059669" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr-green-left)"/>
  <text x="233" y="782" font-size="10" fill="#475569" font-weight="600">Respuesta</text>

  <!-- Blue: Operación DB -->
  <line x1="330" y1="778" x2="360" y2="778" stroke="#0284c7" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="368" y="782" font-size="10" fill="#475569" font-weight="600">Operación DB</text>

  <!-- Orange: Envío email -->
  <line x1="460" y1="778" x2="490" y2="778" stroke="#d97706" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="498" y="782" font-size="10" fill="#475569" font-weight="600">Envío email</text>

</svg>
