<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arr-left" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- ── ACTOR HEADERS ── -->
  <rect x="20" y="44" width="130" height="36" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="85" y="67" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a5f">Usuario</text>

  <rect x="180" y="44" width="130" height="36" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="245" y="67" text-anchor="middle" font-size="14" font-weight="bold" fill="#2d1b69">Frontend</text>

  <rect x="340" y="44" width="130" height="36" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="405" y="67" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a4d2e">Backend</text>

  <rect x="500" y="44" width="130" height="36" rx="8" fill="#c3fae8" stroke="#22c55e" stroke-width="2"/>
  <text x="565" y="67" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a4d4d">PostgreSQL</text>

  <rect x="660" y="44" width="130" height="36" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="725" y="67" text-anchor="middle" font-size="14" font-weight="bold" fill="#5c3d1a">Nodemailer</text>

  <!-- ── LIFELINES ── -->
  <line x1="85"  y1="80" x2="85"  y2="615" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="245" y1="80" x2="245" y2="615" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="405" y1="80" x2="405" y2="615" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="565" y1="80" x2="565" y2="615" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="725" y1="80" x2="725" y2="615" stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ── SECTION: REGISTRO ── -->
  <rect x="10" y="96" width="880" height="202" rx="6" fill="#dbe4ff" fill-opacity="0.4" stroke="#4a9eed" stroke-width="1"/>
  <text x="16" y="113" font-size="14" font-weight="bold" fill="#3b82f6">Registro</text>

  <!-- m1: Usuario → Frontend -->
  <line x1="88" y1="130" x2="241" y2="130" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="95" y="117" width="142" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="166" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">Completa formulario + foto</text>

  <!-- m2: Frontend → Backend -->
  <line x1="248" y1="158" x2="401" y2="158" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="256" y="145" width="136" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="324" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">POST /registerUser</text>

  <!-- m3: Backend → PostgreSQL -->
  <line x1="408" y1="188" x2="561" y2="188" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="414" y="175" width="141" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="485" y="188" text-anchor="middle" font-size="12" font-weight="600" fill="#1e1e1e">INSERT usuario (unconfirmed)</text>

  <!-- m4: Backend → Nodemailer -->
  <line x1="408" y1="218" x2="721" y2="218" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="420" y="205" width="246" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="543" y="218" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">Enviar email con token JWT (1h)</text>

  <!-- m5: Backend → Frontend (dashed return) -->
  <line x1="402" y1="268" x2="249" y2="268" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-left)"/>
  <rect x="287" y="255" width="52" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="313" y="268" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">200 OK</text>

  <!-- ── SECTION: CONFIRMACION ── -->
  <rect x="10" y="308" width="880" height="110" rx="6" fill="#e5dbff" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="1"/>
  <text x="16" y="325" font-size="14" font-weight="bold" fill="#7c3aed">Confirmacion de cuenta</text>

  <!-- m6: Usuario → Frontend -->
  <line x1="88" y1="342" x2="241" y2="342" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="92" y="329" width="143" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="164" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">Click en link del email</text>

  <!-- m7: Frontend → Backend -->
  <line x1="248" y1="370" x2="401" y2="370" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="250" y="357" width="148" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="324" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">GET /confirmRegister/:token</text>

  <!-- m8: Backend → PostgreSQL -->
  <line x1="408" y1="398" x2="561" y2="398" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="412" y="385" width="147" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="485" y="398" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">UPDATE is_confirmed=true</text>

  <!-- ── SECTION: LOGIN ── -->
  <rect x="10" y="428" width="880" height="182" rx="6" fill="#d3f9d8" fill-opacity="0.4" stroke="#22c55e" stroke-width="1"/>
  <text x="16" y="445" font-size="14" font-weight="bold" fill="#15803d">Login y sesion</text>

  <!-- m9: Usuario → Frontend -->
  <line x1="88" y1="462" x2="241" y2="462" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="96" y="449" width="141" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="167" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">Email + contrasena</text>

  <!-- m10: Frontend → Backend -->
  <line x1="248" y1="490" x2="401" y2="490" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="261" y="477" width="103" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="312" y="490" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">POST /loginUser</text>

  <!-- m11: Backend → PostgreSQL -->
  <line x1="408" y1="518" x2="561" y2="518" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="412" y="505" width="147" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="485" y="518" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">SELECT + bcrypt.compare</text>

  <!-- m12: Backend → Frontend (dashed) Set-Cookie -->
  <line x1="402" y1="546" x2="249" y2="546" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-left)"/>
  <rect x="248" y="533" width="152" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="324" y="546" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">Set-Cookie JWT (httpOnly, 7d)</text>

  <!-- m13: Frontend → Backend GET /me -->
  <line x1="248" y1="574" x2="401" y2="574" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="250" y="561" width="150" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="325" y="574" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">GET /me (cookie automatica)</text>

  <!-- m14: Backend → Frontend (dashed) { id, role } -->
  <line x1="402" y1="602" x2="249" y2="602" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-left)"/>
  <rect x="289" y="589" width="68" height="18" rx="3" fill="white" fill-opacity="0.92"/>
  <text x="323" y="602" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">{ id, role }</text>
</svg>
